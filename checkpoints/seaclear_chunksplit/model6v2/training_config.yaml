train_ann_path: seaclear_data/seaclear_480p_chunksplit_train.json  # path to COCO-format train annotation JSON
val_ann_path: seaclear_data/seaclear_480p_chunksplit_val.json    # path to COCO-format val annotation JSON
train_img_dir: seaclear_data/images_480p   # directory containing training images
val_img_dir: seaclear_data/images_480p     # directory containing validation images
num_classes: 41
num_epochs: 50
batch_size: 8
lr: 0.005
momentum: 0.9
weight_decay: 0.0001
optimizer: sgd
min_size: !!python/tuple [256, 288, 320, 352, 384]
max_size: 704
lr_scheduler_type: cosine
cosine_eta_min: 0.00005
warmup_epochs: 1
warmup_factor: 0.001
use_group_norm: true
gn_num_groups: 32
use_v1_arch: false
use_amp: true
use_custom_anchor_generator: true
custom_anchor_sizes: !!python/tuple [ !!python/tuple [16], !!python/tuple [32], !!python/tuple [64], !!python/tuple [128], !!python/tuple [256]]
use_custom_rpn_fg_iou_threshold: false
use_copy_paste: true
copy_paste_prob: 0.5
copy_paste_scale_ranges: !!python/tuple [ !!python/tuple [0.5, 0.8], !!python/tuple [0.8, 1.2]]
copy_paste_scale_range_weights: !!python/tuple [0.6, 0.4]
copy_paste_rotation_range: !!python/tuple [-90, 90]
copy_paste_min_crop_side_length: 16
copy_paste_min_object_area: 128
verbose: true
print_freq: 50
num_workers: 8